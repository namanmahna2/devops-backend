name: AI-DEVOPS Backend

on:
  push:
    branches:
      - main
      - development

jobs:
    build:
      name: Build
      runs-on: ubuntu-latest

      steps:
        - name: Checkout Repository
          uses: actions/checkout@v4

        - name: Setup Node
          uses: actions/setup-node@v4
          with:
            node-version: 20
            cache: npm
        
        - name: Install Dependencies
          run: npm install

        - name: Run Lint if-present
          run: npm run lint --if-present

        - name: Run test (if present)
          run: npm run test --if-present

        - name: Dependency security audit
          run: npm audit --audit-level=high || true

    docker-build-scan-push:
      name: Docker build, scan and push
      runs-on: ubuntu-latest
      needs: build

      steps:
        - name: Checkout repository
          uses: actions/checkout@v4
        
        - name: Setup Docker Buildx
          uses: docker/setup-buildx-action@v3

        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{secrets.DOCKER_USERNAME}}
            password: ${{secrets.DOCKER_PASSWORD}}

        - name: Build docker image(local)
          run: docker buildx build --load -t devops-backend:latest .
          
        - name: Install Trivy
          run: |
            sudo apt-get update
            sudo apt-get install -y wget apt-transport-https gnupg lsb-release
            wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
            echo "deb https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -sc) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update
            sudo apt-get install -y trivy

        - name: Scan docker image
          run: trivy image  --severity HIGH,CRITICAL --ignore-unfixed devops-backend:latest

        - name: Build and push image
          run: docker buildx build --platform linux/amd64 -t namankali/devops-backend:latest --push .

    deploy:
        name: Deploy to kubernetes
        runs-on: ubuntu-latest
        needs: docker-build-scan-push

        steps:
          - name: Placeholder
            run: echo "Deploy step coming soon"
